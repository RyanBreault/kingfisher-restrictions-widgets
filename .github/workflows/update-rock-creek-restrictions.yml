name: Update River Restrictions (TEST)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-restrictions:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Generate TEST restriction data
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");

            const now = new Date().toISOString();
            const SOURCE_URL = "https://fwp.mt.gov/news/current-closures-restrictions/waterbody-closures";

            const output = {
              last_checked: now,
              source_url: SOURCE_URL,
              rivers: {
                "rock-creek": {
                  name: "Rock Creek",
                  restricted: true,
                  restriction_type: "TEST",
                  message: "⚠️ TEST ONLY: Rock Creek Hoot Owl Restriction. Fishing prohibited from 2:00 PM until midnight.",
                  notice_count: 1,
                  notices: [
                    {
                      waterbody: "Rock Creek",
                      title: "TEST Hoot Owl Restriction",
                      location: "Entire River",
                      description: "This is a test restriction generated by GitHub Actions.",
                      restriction_type: "TEST",
                      press_release: "",
                      updatedate: now
                    }
                  ]
                },

                "blackfoot": {
                  name: "Blackfoot River",
                  restricted: false,
                  restriction_type: "",
                  message: "✅ No current fishing restrictions reported for the Blackfoot River.",
                  notice_count: 0,
                  notices: []
                },

                "bitterroot": {
                  name: "Bitterroot River",
                  restricted: false,
                  restriction_type: "",
                  message: "✅ No current fishing restrictions reported for the Bitterroot River.",
                  notice_count: 0,
                  notices: []
                },

                "clark-fork": {
                  name: "Clark Fork River",
                  restricted: false,
                  restriction_type: "",
                  message: "✅ No current fishing restrictions reported for the Clark Fork River.",
                  notice_count: 0,
                  notices: []
                }
              }
            };

            fs.writeFileSync(
              "river-restrictions.json",
              JSON.stringify(output, null, 2) + "\n"
            );

            fs.writeFileSync(
              "rock-creek-restrictions.json",
              JSON.stringify({
                river: "Rock Creek",
                restricted: true,
                restriction_type: "TEST",
                message: "⚠️ TEST ONLY: Rock Creek Hoot Owl Restriction. Fishing prohibited from 2:00 PM until midnight.",
                source_url: SOURCE_URL,
                last_checked: now
              }, null, 2) + "\n"
            );

      - name: Commit updated JSON
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add river-restrictions.json rock-creek-restrictions.json
          git diff --cached --quiet || git commit -m "TEST restriction"
          git push
