name: Update River Restrictions

on:
  schedule:
    - cron: "15 */2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-restrictions:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check FWP restrictions and update JSON
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");

            const FWP_QUERY_URL =
              "https://fwp-gis.mt.gov/arcgis/rest/services/fish/fishViewer/MapServer/1/query" +
              "?where=1%3D1" +
              "&outFields=*" +
              "&returnGeometry=false" +
              "&f=json";

            const SOURCE_URL =
              "https://fwp.mt.gov/news/current-closures-restrictions/waterbody-closures";

            const rivers = {
              "rock-creek": {
                name: "Rock Creek",
                matchTerms: ["rock creek"],
                noRestrictionMessage: "✅ No current fishing restrictions reported for Rock Creek."
              },
              "blackfoot": {
                name: "Blackfoot River",
                matchTerms: ["blackfoot"],
                noRestrictionMessage: "✅ No current fishing restrictions reported for the Blackfoot River."
              },
              "bitterroot": {
                name: "Bitterroot River",
                matchTerms: ["bitterroot"],
                noRestrictionMessage: "✅ No current fishing restrictions reported for the Bitterroot River."
              },
              "clark-fork": {
                name: "Clark Fork River",
                matchTerms: ["clark fork", "clarkfork"],
                noRestrictionMessage: "✅ No current fishing restrictions reported for the Clark Fork River."
              }
            };

            function cleanText(value) {
              if (!value) return "";
              return String(value)
                .replace(/<[^>]*>/g, " ")
                .replace(/&nbsp;/g, " ")
                .replace(/&amp;/g, "&")
                .replace(/\s+/g, " ")
                .trim();
            }

            function getAttr(attrs, names) {
              for (const name of names) {
                if (attrs[name] !== undefined && attrs[name] !== null && attrs[name] !== "") {
                  return attrs[name];
                }
              }
              return "";
            }

            function attrsToSearchText(attrs) {
              return [
                getAttr(attrs, ["WATERBODY", "Waterbody", "waterbody"]),
                getAttr(attrs, ["TITLE", "Title", "title"]),
                getAttr(attrs, ["LOCATION", "Location", "location"]),
                getAttr(attrs, ["DESCRIPTION", "Description", "description"]),
                getAttr(attrs, ["RESTRICTIONTYPE", "RestrictionType", "restriction_type"])
              ].map(cleanText).join(" ").toLowerCase();
            }

            function buildMessage(riverName, matches) {
              if (!matches.length) return "";

              const first = matches[0].attributes || {};
              const type = cleanText(getAttr(first, ["RESTRICTIONTYPE", "RestrictionType", "restriction_type"])) ||
                cleanText(getAttr(first, ["TITLE", "Title", "title"])) ||
                "Fishing Restriction";

              const title = cleanText(getAttr(first, ["TITLE", "Title", "title"])) || type;
              const location = cleanText(getAttr(first, ["LOCATION", "Location", "location"]));
              const description = cleanText(getAttr(first, ["DESCRIPTION", "Description", "description"]));

              let message = `⚠️ ${riverName}: ${title}`;

              if (type && !message.toLowerCase().includes(type.toLowerCase())) {
                message += ` (${type})`;
              }

              if (location) message += `. ${location}`;
              if (description) message += `. ${description}`;

              if (matches.length > 1) {
                message += ` There are ${matches.length} current restriction notices matching this river.`;
              }

              return message.replace(/\s+/g, " ").trim();
            }

            const response = await fetch(FWP_QUERY_URL);
            if (!response.ok) {
              throw new Error(`FWP request failed: ${response.status}`);
            }

            const data = await response.json();
            const features = data.features || [];

            console.log(`FWP restriction records found: ${features.length}`);

            const output = {
              last_checked: new Date().toISOString(),
              source_url: SOURCE_URL,
              data_source: FWP_QUERY_URL,
              rivers: {}
            };

            for (const [key, river] of Object.entries(rivers)) {
              const matches = features.filter(feature => {
                const attrs = feature.attributes || {};
                const searchText = attrsToSearchText(attrs);
                return river.matchTerms.some(term => searchText.includes(term));
              });

              const restricted = matches.length > 0;
              const firstAttrs = restricted ? (matches[0].attributes || {}) : {};

              output.rivers[key] = {
                name: river.name,
                restricted: restricted,
                restriction_type: restricted
                  ? (
                      cleanText(getAttr(firstAttrs, ["RESTRICTIONTYPE", "RestrictionType", "restriction_type"])) ||
                      cleanText(getAttr(firstAttrs, ["TITLE", "Title", "title"])) ||
                      "Fishing Restriction"
                    )
                  : "",
                message: restricted
                  ? buildMessage(river.name, matches)
                  : river.noRestrictionMessage,
                notice_count: matches.length,
                notices: matches.map(feature => {
                  const attrs = feature.attributes || {};
                  return {
                    waterbody: cleanText(getAttr(attrs, ["WATERBODY", "Waterbody", "waterbody"])),
                    title: cleanText(getAttr(attrs, ["TITLE", "Title", "title"])),
                    location: cleanText(getAttr(attrs, ["LOCATION", "Location", "location"])),
                    description: cleanText(getAttr(attrs, ["DESCRIPTION", "Description", "description"])),
                    restriction_type: cleanText(getAttr(attrs, ["RESTRICTIONTYPE", "RestrictionType", "restriction_type"])),
                    press_release: cleanText(getAttr(attrs, ["PRESSRELEASE", "PressRelease", "press_release"])),
                    updatedate: getAttr(attrs, ["UPDATEDATE", "UpdateDate", "updatedate"]) || null
                  };
                })
              };

              console.log(`${river.name}: ${matches.length} matching restriction record(s)`);
            }

            fs.writeFileSync(
              "river-restrictions.json",
              JSON.stringify(output, null, 2) + "\n"
            );

            const rock = output.rivers["rock-creek"];
            fs.writeFileSync(
              "rock-creek-restrictions.json",
              JSON.stringify({
                river: "Rock Creek",
                restricted: rock.restricted,
                restriction_type: rock.restriction_type,
                message: rock.message,
                source_url: SOURCE_URL,
                last_checked: output.last_checked
              }, null, 2) + "\n"
            );

      - name: Commit updated JSON
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add river-restrictions.json rock-creek-restrictions.json
          git diff --cached --quiet || git commit -m "Update river restrictions"
          git push
